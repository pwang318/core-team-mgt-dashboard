<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Team Master Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;color:#1a1a1a;font-size:14px;background:#f0f2f5;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:1rem 1rem 3rem}
.header{padding:.9rem 0 .7rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-bottom:1px solid #dde1e7;margin-bottom:1rem}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{background:#1F4E79;color:#fff;font-weight:700;font-size:14px;padding:7px 14px;border-radius:8px;letter-spacing:.05em}
.brand-sub{font-size:12px;color:#666}
.week-pill{font-size:11px;background:#e8eaf0;padding:4px 11px;border-radius:20px;color:#555}
.sync{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.sync-dot.live{background:#43A047}.sync-dot.saving{background:#FB8C00}.sync-dot.error{background:#E53935}
.refresh-btn{border:1px solid #dde1e7;background:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:#555;font-family:inherit}
.refresh-btn:hover{background:#f5f6fa}
.section-title{font-size:15px;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.section-divider{border:none;border-top:1px solid #dde1e7;margin:1.5rem 0}

/* LP GRID */
.lp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1rem}
.lp-card{background:#fff;border:1px solid #dde1e7;border-radius:12px;padding:.9rem 1rem}
.lp-name{font-weight:700;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.lp-pct{font-size:26px;font-weight:800;margin-bottom:4px}
.lp-bar-track{background:#eee;border-radius:20px;height:5px;margin-bottom:5px;overflow:hidden}
.lp-bar{height:5px;border-radius:20px}
.lp-meta{font-size:11px;color:#888;display:flex;justify-content:space-between}
.lp-flags{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap}

/* SCORECARD */
.scorecard{background:#fff;border:1px solid #dde1e7;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.sc-header{padding:.85rem 1.1rem;cursor:default;display:flex;justify-content:space-between;align-items:center}
.sc-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;cursor:pointer}
.pill-green{background:#EAF3DE;color:#3B6D11}
.pill-amber{background:#FAEEDA;color:#854F0B}
.pill-red{background:#FCEBEB;color:#A32D2D}
.sc-body{border-top:1px solid #f0f2f5;padding:.9rem 1.1rem}
.sc-row{padding:9px 0;border-bottom:1px solid #f0f2f5}
.sc-row:last-child{border-bottom:none}
.sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc-name{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.sc-right{display:flex;align-items:center;gap:10px}
.sc-pct{font-size:20px;font-weight:800}
.sc-sub{font-size:11px;color:#888}
.missed-box{background:#FFEBEE;border-radius:6px;padding:5px 9px;font-size:11px;color:#C62828;margin-top:4px}
.won-box{font-size:11px;color:#43A047;font-weight:500;margin-top:2px}
.chevron{font-size:14px;color:#888;transition:transform .2s;cursor:pointer}

/* AMANDA SECTION */
.amanda-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-bottom:1rem}
.a-card{background:#fff;border:1px solid #dde1e7;border-radius:10px;padding:.75rem .9rem;border-left:3px solid #7B1FA2}
.a-label{font-size:10px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.a-val{font-size:20px;font-weight:700}
.a-sub{font-size:10px;color:#888;margin-top:2px}
.a-bar-track{background:#eee;border-radius:20px;height:3px;margin-top:5px;overflow:hidden}
.a-bar{height:3px;border-radius:20px;background:#7B1FA2}

/* ALERTS */
.alert-section{background:#fff;border:1px solid #dde1e7;border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem}
.alert-section h3{font-size:13px;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.alert-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0f2f5;font-size:13px;flex-wrap:wrap}
.alert-item:last-child{border-bottom:none}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.adot-red{background:#E53935}.adot-amber{background:#FB8C00}.adot-green{background:#43A047}
.lp-tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:600}
.lp-tag-Gavin{background:#E8F5E9;color:#2E7D32}.lp-tag-Karen{background:#E3F2FD;color:#1565C0}
.lp-tag-Osgood{background:#FFF8E1;color:#E65100}.lp-tag-Jordan{background:#FCE4EC;color:#880E4F}
.lp-tag-Said{background:#EDE7F6;color:#4527A0}
.badge-a{background:#C6EFCE;color:#1B5E20;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.badge-b{background:#BBDEFB;color:#0D47A1;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.badge-c{background:#EEE;color:#424242;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}

/* NEVER LOGGED */
.never-logged-banner{background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#854F0B;display:none;align-items:center;gap:8px}
</style>
</head>

function getWeekKey(d){var dt=new Date(d);dt.setHours(0,0,0,0);var day=dt.getDay(),mon=new Date(dt);mon.setDate(dt.getDate()-(day===0?6:day-1));return mon.toISOString().split("T")[0];}
function getLastWeekKey(d){var dt=new Date(d);dt.setDate(dt.getDate()-7);return getWeekKey(dt);}
function getWeekLabel(k){var mon=new Date(k),sun=new Date(mon);sun.setDate(mon.getDate()+6);var o={month:"short",day:"numeric"};return "Week of "+mon.toLocaleDateString("en-US",o)+" - "+sun.toLocaleDateString("en-US",o);}
function fmt(d){if(!d)return "--";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"});}
function mostRecent(a){return[a[3],a[4],a[5],a[6]].filter(Boolean).sort().reverse()[0]||null;}
function isActive(a){var d=mostRecent(a);return d?new Date(d)>=CUTOFF:false;}
function calledThisWeek(name){return !!(callLogs[name]&&callLogs[name].week_key===weekKey);}
function lpDays(name){var log=callLogs[name];if(!log||!log.call_date)return null;var dt=new Date(log.call_date);dt.setHours(0,0,0,0);return Math.floor((TODAY-dt)/86400000);}
function isPriority(a){return a[7]===true;}
function setSyncStatus(s){var dot=document.getElementById("syncDot"),txt=document.getElementById("syncTxt");if(s==="live"){dot.className="sync-dot live";txt.textContent="Live";}else if(s==="saving"){dot.className="sync-dot saving";txt.textContent="Loading...";}else{dot.className="sync-dot error";txt.textContent="Error";}}

function sbFetch(method,path){
  return fetch(SUPABASE_URL+"/rest/v1/"+path,{method:method,headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});return r.status===204?null:r.json();});
}

function getRotation(lp,wkKey){
  var active=agents.filter(function(a){return a[2]===lp&&isActive(a);});
  if(!active.length)return[];
  var wn=Math.floor((new Date(wkKey)-new Date("2024-01-01"))/(7*86400000));
  var pw=Math.min(15,active.length);
  var si=(wn*pw)%active.length;
  var priority=active.filter(isPriority);
  var normal=active.filter(function(a){return!isPriority(a);});
  var remaining=Math.max(0,15-priority.length);
  var pw2=Math.min(remaining,normal.length);
  var si2=normal.length?((wn*pw2)%normal.length):0;
  var base=[];for(var i=0;i<pw2;i++)base.push(normal[(si2+i)%normal.length]);
  var combined=priority.concat(base);
  var seen={},res=[];
  for(var j=0;j<combined.length;j++){if(!seen[combined[j][0]]){seen[combined[j][0]]=true;res.push(combined[j]);}}
  return res.slice(0,15);
}

function loadAll(){
  setSyncStatus("saving");
  agents=SEED.map(function(r){return[r[0],r[1],r[2],r[3],r[4],r[5],r[6],r[7]];});
  return Promise.all([
    sbFetch("GET","call_logs?week_key=eq."+weekKey+"&select=*"),
    sbFetch("GET","call_logs?week_key=eq."+lastWeekKey+"&select=*"),
    sbFetch("GET","amanda_activities?select=*&order=act_date.desc,created_at.desc")
  ]).then(function(res){
    callLogs={};lastWeekCallLogs={};
    if(res[0])res[0].forEach(function(r){callLogs[r.agent_name]=r;});
    if(res[1])res[1].forEach(function(r){lastWeekCallLogs[r.agent_name]=r;});
    amandaActivities=res[2]||[];
    amandaLastWeek=amandaActivities.filter(function(a){return getWeekKey(new Date(a.act_date+"T12:00:00"))===lastWeekKey;});
    setSyncStatus("live");
    renderAll();
  }).catch(function(e){setSyncStatus("error");console.log(e);});
}

function renderAll(){
  document.getElementById("weekPill").textContent=getWeekLabel(weekKey);
  document.getElementById("this-week-lbl").textContent=getWeekLabel(weekKey);
  document.getElementById("last-week-lbl").textContent=getWeekLabel(lastWeekKey);
  renderLPGrid();
  renderLPScorecard("this",callLogs,weekKey);
  renderLPScorecard("last",lastWeekCallLogs,lastWeekKey);
  renderAmandaGrid();
  renderAmandaScorecard("this",amandaActivities.filter(function(a){return getWeekKey(new Date(a.act_date+"T12:00:00"))===weekKey;}));
  renderAmandaScorecard("last",amandaLastWeek);
  checkNeverLogged();
}

function renderLPGrid(){
  document.getElementById("lp-grid").innerHTML=LPS.map(function(lp){
    var rot=getRotation(lp,weekKey);
    var done=rot.filter(function(a){return calledThisWeek(a[0]);}).length;
    var pct=rot.length?Math.round(done/rot.length*100):0;
    var all=agents.filter(function(a){return a[2]===lp;});
    var ic=all.filter(function(a){return!isActive(a);}).length;
    var pc=all.filter(function(a){return isPriority(a)&&isActive(a);}).length;
    var col=pct===100?"#43A047":pct>50?"#FB8C00":"#E53935";
    return '<div class="lp-card">'+
      '<div class="lp-name"><span style="width:10px;height:10px;border-radius:50%;background:'+LP_COLORS[lp]+';display:inline-block"></span><span style="color:'+LP_COLORS[lp]+'">'+lp+'</span></div>'+
      '<div class="lp-pct" style="color:'+col+'">'+pct+'%</div>'+
      '<div class="lp-bar-track"><div class="lp-bar" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div class="lp-meta"><span>'+done+"/"+rot.length+" this week</span><span>"+all.length+" agents</span></div>"+
      '<div class="lp-flags">'+(pc?'<span style="background:#FFEBEE;color:#C62828;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600">'+pc+' priority</span>':"")+
        (ic?'<span style="background:#FFF8E1;color:#E65100;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600">'+ic+' inactive</span>':"")+"</div>"+
    '</div>';
  }).join("");
}

function renderLPScorecard(which,logs,wkKey){
  var pills="",content="";

  if(which==="last"){document.getElementById("lp-last-scorecard").style.display=hasData?"block":"none";if(!hasData)return;}
  LPS.forEach(function(lp){
    var rot=getRotation(lp,wkKey);
    var done=rot.filter(function(a){return !!(logs[a[0]]&&logs[a[0]].week_key===wkKey);}).length;
    var missed=rot.filter(function(a){return !(logs[a[0]]&&logs[a[0]].week_key===wkKey);});
    var pct=rot.length?Math.round(done/rot.length*100):0;
    var col=pct===100?"#43A047":pct>=80?"#FB8C00":"#E53935";
    var bg=pct===100?"pill-green":pct>=80?"pill-amber":"pill-red";

  var cards=[
    {label:"Overall progress",val:overallPct+"%",sub:total+" of "+goalTotal+" activities",pct:overallPct},
    {label:"New meetings",val:(counts["First Meeting"]||0)+"/5",sub:"weekly goal",pct:Math.min(100,((counts["First Meeting"]||0)/5)*100)},
    {label:"Break breads",val:(counts["Break Bread"]||0)+"/5",sub:"weekly goal",pct:Math.min(100,((counts["Break Bread"]||0)/5)*100)},
    {label:"Check-ins",val:(counts["Active Check-in"]||0)+"/10",sub:"weekly goal",pct:Math.min(100,((counts["Active Check-in"]||0)/10)*100)},
    {label:"Cold calls",val:(counts["Cold Call"]||0)+"/25",sub:"weekly goal",pct:Math.min(100,((counts["Cold Call"]||0)/25)*100)},
  ];
  document.getElementById("amanda-grid").innerHTML=cards.map(function(c){
    var col=c.pct>=100?"#43A047":c.pct>=60?"#FB8C00":"#E53935";
    return '<div class="a-card"><div class="a-label">'+c.label+'</div>'+
      '<div class="a-val" style="color:'+col+'">'+c.val+'</div>'+
      '<div class="a-bar-track"><div class="a-bar" style="width:'+c.pct+'%;background:'+col+'"></div></div>'+
      '<div class="a-sub">'+c.sub+'</div></div>';
  }).join("");
}

function renderAmandaScorecard(which,acts){
  var hasData=acts.length>0;
  if(which==="last"){document.getElementById("amanda-last-scorecard").style.display=hasData?"block":"none";if(!hasData)return;}
  var counts={};acts.forEach(function(a){counts[a.act_type]=(counts[a.act_type]||0)+1;});
  var pills="",content="";
  Object.keys(AMANDA_GOALS).forEach(function(t){
    var done=counts[t]||0,goal=AMANDA_GOALS[t];
    var pct=Math.min(100,Math.round(done/goal*100));
    var col=pct>=100?"#43A047":pct>=60?"#FB8C00":"#E53935";
    var bg=pct>=100?"pill-green":pct>=60?"pill-amber":"pill-red";
    pills+='<span class="pill '+bg+'">'+t.split(" ")[0]+" "+pct+'%</span>';
    content+='<div class="sc-row"><div class="sc-top"><div class="sc-name">'+t+'</div>'+
      '<div class="sc-right"><span class="sc-pct" style="color:'+col+'">'+pct+'%</span><span class="sc-sub">'+done+"/"+goal+"</span></div></div>"+
      (pct>=100?'<div class="won-box">&#10003; Goal hit!</div>':
       '<div class="missed-box"><b>Short by '+( goal-done)+'</b> this week</div>')+
    '</div>';
  });
  document.getElementById("amanda-"+which+"-pills").innerHTML=pills;
  document.getElementById("amanda-"+which+"-content").innerHTML=content;
}

function checkNeverLogged(){
  var banner=document.getElementById("never-logged-banner");
  if(!amandaActivities.length){banner.style.display="flex";document.getElementById("last-logged-date").textContent="Never";return;}
  var last=amandaActivities[0];
  var lastDate=new Date(last.act_date+"T12:00:00");lastDate.setHours(0,0,0,0);
  var days=Math.floor((TODAY-lastDate)/86400000);
  if(days>=3){banner.style.display="flex";document.getElementById("last-logged-date").textContent=fmt(last.act_date)+" ("+days+" days ago)";}
  else banner.style.display="none";
}

function toggleSection(bodyId,chevId){
  var body=document.getElementById(bodyId);
  var chev=document.getElementById(chevId);
  var isOpen=body.style.display!=="none";
  body.style.display=isOpen?"none":"block";
  chev.style.transform=isOpen?"":"rotate(180deg)";
}

setInterval(function(){loadAll();},60000);
document.getElementById("weekPill").textContent=getWeekLabel(weekKey);
loadAll();
</script>
